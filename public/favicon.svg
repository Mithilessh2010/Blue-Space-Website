<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#050810"/>

  <!-- Galaxy gradient circle -->
  <defs>
    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A70A9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:0.6" />
    </radialGradient>
  </defs>

  <circle cx="96" cy="96" r="88" fill="url(#galaxyGradient)"/>

  <!-- Border circle -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#4A70A9" stroke-width="2" opacity="0.6"/>

  <!-- Inner glow -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#8FABD4" stroke-width="1" opacity="0.3"/>
</svg>
