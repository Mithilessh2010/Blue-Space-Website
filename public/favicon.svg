<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle">
      <circle cx="90" cy="90" r="85"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="#050810"/>

  <!-- Galaxy image clipped to circle -->
  <image
    href="/images/galaxy.png"
    x="5"
    y="5"
    width="170"
    height="170"
    clip-path="url(#circle)"
  />

  <!-- Circle border -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="#4A70A9" stroke-width="2" opacity="0.6"/>
</svg>
