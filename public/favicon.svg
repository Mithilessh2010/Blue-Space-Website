<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="circleMask">
      <circle cx="96" cy="96" r="92" fill="white"/>
    </mask>
  </defs>

  <!-- Galaxy image with circular mask -->
  <image
    href="/images/galaxy.png"
    x="4"
    y="4"
    width="184"
    height="184"
    mask="url(#circleMask)"
    preserveAspectRatio="xMidYMid slice"
  />

  <!-- Subtle border -->
  <circle cx="96" cy="96" r="92" fill="none" stroke="#4A70A9" stroke-width="1.5" opacity="0.5"/>
</svg>
